<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ config.title }}</title>
  <link rel="stylesheet" href="{{ get_url(path="style.css") }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-okaidia.min.css"
        integrity="sha384-qTzu9jz8wpyzFe5KLoZfw0CS5iY+kCoZlBd5ByJ3f0NUT9dgYI1Mk0jQJ5GUK/N"
        crossorigin="anonymous">
</head>

<body>
  <nav class="nav-container">
    <div class="nav-content">
      <div class="nav-brand">
        <a href="/">Rei's Blog</a>
      </div>
      <div class="nav-links">
        <a href="/" class="nav-link {% if current_path == "/" %}active{% endif %}">首页</a>
        <a href="/blog" class="nav-link {% if current_path is starting_with("/blog") %}active{% endif %}">博客</a>
        <a href="/tags" class="nav-link {% if current_path is starting_with("/tags") %}active{% endif %}">标签</a>
        <a href="/about" class="nav-link {% if current_path is starting_with("/about") %}active{% endif %}">关于</a>
      </div>
    </div>
  </nav>

  <div class="container">
    {% block content %} {% endblock %}
  </div>

  {# 页脚 #}
  <footer class="site-footer">
    <p>© {{ now() | date(format="%Y") }} Rei's Blog · Built with <a href="https://www.getzola.org/">Zola</a></p>
  </footer>

  {# 回到顶部按钮 #}
  <button class="back-to-top" id="backToTop" aria-label="回到顶部" title="回到顶部">↑</button>

  {# Prism.js 代码高亮 — 使用 autoloader 按需加载语法组件 #}
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"
          integrity="sha384-ZM8fDxYm+GXOWeJcxDetoRImNnEAS7XwVFH5kv0pT6RXNy92Nemw/Sj7NfciXpqg"
          crossorigin="anonymous" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"
          integrity="sha384-Uq05+JLko69eOiPr39ta9bh7kld5PKZoU+fF7g0EXTAriEollhZ+DrN8Q/Oi8J2Q"
          crossorigin="anonymous" defer></script>

  {# 回到顶部按钮逻辑 #}
  <script>
    (function() {
      var btn = document.getElementById('backToTop');
      if (!btn) return;

      var ticking = false;
      window.addEventListener('scroll', function() {
        if (!ticking) {
          window.requestAnimationFrame(function() {
            if (window.scrollY > 300) {
              btn.classList.add('visible');
            } else {
              btn.classList.remove('visible');
            }
            ticking = false;
          });
          ticking = true;
        }
      });

      btn.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    })();
  </script>
</body>

</html>
